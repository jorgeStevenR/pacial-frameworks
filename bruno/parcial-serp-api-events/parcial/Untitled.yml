info:
  name: Get todos los eventos (sin filtros)
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/eventos?ciudad={{ciudad}}&hl={{hl}}&gl={{gl}}"
  auth: inherit

runtime:
  variables:
    - name: url
      value: http://localhost:3001
    - name: ciudad
      value: Austin
    - name: hl
      value: es
    - name: gl
      value: es

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
