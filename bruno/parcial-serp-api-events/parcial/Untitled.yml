info:
  name: Get todos los eventos (sin filtros)
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3001/eventos
  auth: inherit
  query:
    - name: ciudad
      value: Austin
      enabled: true
    - name: hl
      value: es
      enabled: true
    - name: gl
      value: es
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
