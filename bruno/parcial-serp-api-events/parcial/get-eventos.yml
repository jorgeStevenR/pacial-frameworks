info:
  name: Get eventos con filtros variables
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3001/eventos
  auth: inherit
  params:
    - name: ciudad
      value: Austin
      enabled: true
    - name: fecha
      value: week
      enabled: true
    - name: virtual
      value: "false"
      enabled: true
    - name: hl
      value: es
      enabled: true
    - name: gl
      value: es
      enabled: true
    - name: start
      value: "0"
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
